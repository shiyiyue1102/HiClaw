# =============================================================================
# HiClaw Helm Chart — values.yaml
# =============================================================================
# Default configuration for local Kubernetes deployment (kind / minikube).
# Override with values-aliyun.yaml for Alibaba Cloud ACK/ACS deployments.
# =============================================================================

global:
  namespace: ""  # defaults to .Release.Namespace
  imageRegistry: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress
  imageTag: "v1.0.9"

imagePullSecrets: []

# ── Credentials (shared across all components) ────────────────────────────
credentials:
  registrationToken: ""       # Matrix registration token (auto-generated if empty)
  adminUser: "admin"
  adminPassword: ""           # Matrix admin password (auto-generated if empty)
  llmApiKey: ""               # LLM API key (required)
  llmProvider: "qwen"
  defaultModel: "qwen3.5-plus"
  controllerApiKey: ""       # Controller auth key (auto-generated if empty)

# ── Matrix ────────────────────────────────────────────────────────────────
matrix:
  provider: tuwunel           # tuwunel | synapse
  mode: managed               # managed | existing
  internalURL: ""             # existing mode only; managed mode auto-derives
  serverName: ""              # existing mode only; managed mode auto-derives
  tuwunel:
    image:
      repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/tuwunel
      tag: "20260216"
      pullPolicy: IfNotPresent
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    service:
      type: ClusterIP
      port: 6167
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""    # empty = default StorageClass
      mountPath: /data/conduwuit
    extraEnv: {}
  synapse: {}

# ── Gateway ───────────────────────────────────────────────────────────────
gateway:
  provider: higress           # higress | ai-gateway
  mode: managed               # managed | existing
  publicURL: ""               # required browser/public URL, e.g. http://localhost:18080
  higress:
    enabled: true             # controls Higress subchart deployment
  aiGateway: {}

# ── Storage ───────────────────────────────────────────────────────────────
storage:
  provider: minio             # minio | oss
  mode: managed               # managed | existing
  bucket: "hiclaw"
  minio:
    image:
      repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/minio
      tag: "20260216"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    service:
      type: ClusterIP
      apiPort: 9000
      consolePort: 9001
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""
    auth:
      rootUser: "minioadmin"
      rootPassword: "minioadmin"
  oss: {}

# ── Higress subchart values (passed directly to the higress dependency) ───
# `gateway.higress.enabled` is the materialized condition flag. The actual
# Higress chart still reads values from the top-level `higress:` block because
# the dependency name is `higress`.
# See https://higress.io/en/docs/latest/user/configurations/ for full options.
higress:
  global:
    local: true               # kind / minikube: no cloud LoadBalancer
  higress-core:
    gateway:
      replicas: 1
      httpPort: 80
      httpsPort: 443
      service:
        type: ClusterIP
        ports:
          - name: http2
            port: 80
            protocol: TCP
            targetPort: 80
          - name: https
            port: 443
            protocol: TCP
            targetPort: 443
    controller:
      replicas: 1
      image: higress
  higress-console:
    admin:
      password: ""   # leave empty — controller initializes via /system/init using credentials.adminPassword

# ── Controller (CRD reconciler + worker lifecycle + gateway + credentials) ─
controller:
  replicaCount: 1               # increase for HA with leader election
  image:
    repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-controller
    tag: ""                   # defaults to global.imageTag
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8090
    targetPort: 8090
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  workerBackend: "k8s"        # k8s | sae
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  env: {}
  timezone: "Asia/Shanghai"

# ── Manager Agent (CRD-driven) ────────────────────────────────────────────
# When enabled, the controller creates a Manager CR at startup. The
# ManagerReconciler then provisions the Matrix account, Gateway consumer,
# and Pod automatically. No static Deployment is created by Helm.
manager:
  enabled: true                 # create Manager CR during cluster initialization
  model: ""                     # LLM model; defaults to credentials.defaultModel
  runtime: "openclaw"           # openclaw | copaw
  image:
    repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-manager
    tag: ""                     # defaults to global.imageTag
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

# ── Element Web (IM UI, optional) ─────────────────────────────────────────
elementWeb:
  enabled: true
  image:
    repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/element-web
    tag: "20260216"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 8080

# ── Worker defaults ───────────────────────────────────────────────────────
worker:
  defaultImage:
    openclaw:
      repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-worker
      tag: ""                 # defaults to global.imageTag
    copaw:
      repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-copaw-worker
      tag: ""                 # defaults to global.imageTag
  defaultRuntime: "openclaw"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
